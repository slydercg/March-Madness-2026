<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background circle -->
  <circle cx="256" cy="256" r="256" fill="#0a1628"/>

  <!-- Basketball -->
  <circle cx="256" cy="240" r="160" fill="#E8751A" stroke="#c45a00" stroke-width="6"/>

  <!-- Basketball seam lines -->
  <!-- Horizontal seam -->
  <path d="M96 240 Q256 180 416 240" fill="none" stroke="#1a0a00" stroke-width="5" stroke-linecap="round"/>
  <path d="M96 240 Q256 300 416 240" fill="none" stroke="#1a0a00" stroke-width="5" stroke-linecap="round"/>
  <!-- Vertical seam -->
  <path d="M256 80 Q200 240 256 400" fill="none" stroke="#1a0a00" stroke-width="5" stroke-linecap="round"/>
  <path d="M256 80 Q312 240 256 400" fill="none" stroke="#1a0a00" stroke-width="5" stroke-linecap="round"/>

  <!-- March Madness text banner -->
  <rect x="60" y="410" width="392" height="60" rx="12" fill="#1a5c38"/>
  <text x="256" y="450" text-anchor="middle" font-family="Arial Black, Arial, sans-serif" font-weight="900" font-size="36" fill="#f0c832" letter-spacing="2">MARCH MADNESS</text>
</svg>
